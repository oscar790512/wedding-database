name: Deploy Database to Supabase

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target:
        description: "Database environment to deploy"
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

jobs:
  deploy-staging:
    name: Deploy staging database
    if: ${{ github.event_name == 'push' || github.event.inputs.target == 'staging' }}
    runs-on: ubuntu-latest
    environment: staging
    env:
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_STAGING_PROJECT_REF }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_STAGING_DB_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest
          github-token: ${{ github.token }}

      - name: Verify staging deployment secrets
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::Missing GitHub secret SUPABASE_ACCESS_TOKEN"
            exit 1
          fi

          if [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "::error::Missing GitHub secret SUPABASE_STAGING_PROJECT_REF"
            exit 1
          fi

          if [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "::error::Missing GitHub secret SUPABASE_STAGING_DB_PASSWORD"
            exit 1
          fi

      - name: Link staging Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Apply schema.sql
        run: supabase db query --file schema.sql --linked

  deploy-production:
    name: Deploy production database
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'production' }}
    runs-on: ubuntu-latest
    environment: production
    env:
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest
          github-token: ${{ github.token }}

      - name: Verify production deployment secrets
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::Missing GitHub secret SUPABASE_ACCESS_TOKEN"
            exit 1
          fi

          if [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "::error::Missing GitHub secret SUPABASE_PROJECT_REF"
            exit 1
          fi

          if [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "::error::Missing GitHub secret SUPABASE_DB_PASSWORD"
            exit 1
          fi

      - name: Link production Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Apply schema.sql
        run: supabase db query --file schema.sql --linked
